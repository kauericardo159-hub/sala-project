<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Discord Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-container">
        
        <section id="tela-salas" class="container">
            <header class="lobby-header">
                <h1>Mini Discord</h1>
                <p>Crie ou entre em canais de voz e texto em tempo real</p>
            </header>
            
            <div class="card-secao">
                <label for="username">Seu Apelido</label>
                <input type="text" id="username" placeholder="Ex: Alex_Dev" required>
            </div>

            <div class="card-secao criacao-sala">
                <h3>Criar Novo Canal</h3>
                <input type="text" id="new-room-name" placeholder="Nome do canal (letras minúsculas)">
                
                <div class="seletor-grupo">
                    <select id="room-type" onchange="alternarCampoSenha()">
                        <option value="publica">🌐 Canal Público</option>
                        <option value="privada">🔒 Canal Privado (Com Senha)</option>
                    </select>
                </div>
                
                <input type="password" id="room-password" placeholder="Defina a senha de acesso" style="display: none;">
                <button class="btn-principal" onclick="criarNovaSala()">Criar Sala</button>
            </div>

            <div class="card-secao">
                <h3>Canais Ativos</h3>
                <div id="lista-de-salas">
                    <p class="txt-vazio">Buscando canais no servidor...</p>
                </div>
            </div>
        </section>

        <section id="tela-chat" class="container-chat" style="display: none;">
            
            <div class="painel-call">
                <div class="call-header">
                    <h2 id="nome-sala-titulo">Sala: #geral</h2>
                    <span id="status-conexao" style="color: #248046; font-size: 12px;">● Conectado à Call</span>
                </div>
                <div class="video-grid" id="video-grid">
                    </div>
                <div class="call-actions">
                    <button onclick="sairDaSala()" class="btn-sair">Desconectar da Sala</button>
                </div>
            </div>
            
            <div class="painel-texto">
                <div class="chat-area" id="chat-mensagens">
                    </div>
                <div class="input-area">
                    <input type="text" id="txt-mensagem" placeholder="Conversar com o grupo... (Pressione Enter)">
                </div>
            </div>

        </section>

    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        // Descobre automaticamente se deve conectar no Render ou no Localhost (Acode/Termux)
        const urlServidor = window.location.hostname.includes("github.io") 
            ? "https://sala-project.onrender.com" 
            : window.location.origin;

        // Inicializa o Socket Globalmente para os outros arquivos usarem
        const socket = io(urlServidor);
    </script>

    <script src="salas.js"></script>
    <script src="chat.js"></script>
</body>
</html>
