<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Project — Pro Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-login" class="screen" style="display: flex;">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Sala Project</h2>
                <p id="auth-subtitle">De volta ao ecossistema? Faça seu login.</p>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="active">Entrar</button>
                <button id="tab-register">Criar Conta</button>
            </div>

            <div class="input-group">
                <label for="login-username">Seu @username (Minúsculo, sem espaços)</label>
                <input type="text" id="login-username" placeholder="@usuario" autocomplete="off">
            </div>

            <div class="input-group" id="group-displayname" class="hidden">
                <label for="login-displayname">Nome de Exibição</label>
                <input type="text" id="login-displayname" placeholder="Ex: Kauê Ricardo">
            </div>

            <div class="input-group">
                <label for="login-password">Sua Senha</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>

            <button id="btn-auth-submit" class="btn-primary">Entrar com Segurança</button>
        </div>
    </div>

    <div id="screen-dashboard" class="screen">
        
        <aside class="sidebar">
            <div class="profile-card">
                <label for="avatar-input" title="Clique para trocar a foto">
                    <img id="sidebar-avatar" src="user-photo.jpg" alt="Seu Avatar">
                </label>
                <input type="file" id="avatar-input" accept="image/*">
                
                <div class="profile-info">
                    <strong id="sidebar-user-name">Carregando...</strong>
                    <span id="sidebar-user-tag">@user#0000</span>
                </div>
            </div>

            <div class="create-room-sidebar-panel">
                <h3>Criar Nova Sala</h3>
                
                <div class="input-group">
                    <label for="room-name">Nome da Sala</label>
                    <input type="text" id="room-name" placeholder="Ex: Call da Madrugada">
                </div>

                <div class="room-options-row">
                    <div class="option-field">
                        <label for="room-type">Tipo</label>
                        <select id="room-type">
                            <option value="public">Pública</option>
                            <option value="private">Privada</option>
                        </select>
                    </div>
                    <div class="option-field">
                        <label for="room-limit">Limite</label>
                        <input type="number" id="room-limit" value="8" min="2" max="50">
                    </div>
                </div>

                <div class="input-group hidden" id="group-room-password">
                    <label for="room-password">Senha de Acesso</label>
                    <input type="password" id="room-password" placeholder="Defina a senha">
                </div>

                <button id="btn-create-room" class="btn-primary">Lançar Sala</button>
            </div>

            <button id="btn-logout">Sair da Conta</button>
        </aside>

        <main class="main-feed">
            <h2 class="feed-title">Salas Disponíveis</h2>
            <p class="feed-subtitle">Participe de conversas por voz e texto em tempo real.</p>
            
            <div id="rooms-feed"></div>
        </main>

        <aside class="friends-panel">
            <h3>Amigos (<span id="friends-online-count">0</span>)</h3>
            
            <div class="add-friend-row">
                <input type="text" id="input-friend-uid" placeholder="@user#0000">
                <button id="btn-send-friend-request" class="btn-primary">➕</button>
            </div>

            <div class="friend-requests-wrapper">
                <span class="section-label">
                    Convites Pendentes 
                    <span id="friend-requests-badge" class="hidden">0</span>
                </span>
                <div id="friend-requests-container"></div>
            </div>

            <div class="social-scroll-section">
                <span class="section-label">Meus Amigos</span>
                <div id="friends-list-container"></div>
            </div>
        </aside>
    </div>

    <div id="screen-room" class="screen">
        
        <section class="voice-area">
            <div class="room-header">
                <div class="room-header-meta">
                    <h2 id="room-title">Nome da Sala</h2>
                </div>
                <div class="room-control-buttons">
                    <button id="btn-mute" class="btn-control">Ligar Microfone</button>
                    <button id="btn-leave-room" class="btn-control">Sair da Sala</button>
                </div>
            </div>

            <div id="voice-subscribers-grid"></div>
        </section>

        <section class="chat-area">
            <div class="chat-header">Bate-papo da Sala</div>
            
            <div id="chat-messages-container"></div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Conversar com a sala..." autocomplete="off">
                <button id="btn-send-message" class="btn-primary">Enviar</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module" src="main.js"></script>

</body>
</html>
