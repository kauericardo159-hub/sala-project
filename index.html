<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Discord Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-container">
        
        <section id="tela-salas" class="container">
            <header class="lobby-header">
                <h1>Mini Discord</h1>
                <p>Crie ou entre em canais de voz e texto em tempo real</p>
            </header>
            
            <div class="card-secao">
                <label for="username">Seu Apelido</label>
                <input type="text" id="username" placeholder="Ex: Alex_Dev" required>
            </div>

            <div class="card-secao criacao-sala">
                <h3>Criar Novo Canal</h3>
                <input type="text" id="new-room-name" placeholder="Nome do canal (letras minúsculas)">
                
                <div class="seletor-grupo">
                    <select id="room-type" onchange="alternarCampoSenha()">
                        <option value="publica">🌐 Canal Público</option>
                        <option value="privada">🔒 Canal Privado (Com Senha)</option>
                    </select>
                </div>
                
                <input type="password" id="room-password" placeholder="Defina a senha de acesso" style="display: none;">
                <button class="btn-principal" onclick="criarNovaSala()">Criar Sala</button>
            </div>

            <div class="card-secao">
                <h3>Canais Ativos</h3>
                <div id="lista-de-salas">
                    <p class="txt-vazio">Buscando canais no servidor...</p>
                </div>
            </div>
        </section>

        <section id="tela-chat" class="container-chat" style="display: none;">
            
            <div class="painel-call">
                <div class="call-header">
                    <h2 id="nome-sala-titulo">Sala: #geral</h2>
                    <span id="status-conexao" style="color: #248046; font-size: 12px;">● Conectado à Call</span>
                </div>
                <div class="video-grid" id="video-grid">
                    </div>
                <div class="call-actions">
                    <button onclick="sairDaSala()" class="btn-sair">Desconectar da Sala</button>
                </div>
            </div>
            
            <div class="painel-texto">
                <div class="chat-area" id="chat-mensagens">
                    </div>
                <div class="input-area">
                    <input type="text" id="txt-mensagem" placeholder="Conversar com o grupo... (Pressione Enter)">
                </div>
            </div>

        </section>

    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        // Lógica Inteligente de Descoberta de Link:
        // Se rodar no GitHub Pages, ele tenta se conectar ao backend correspondente.
        // Se rodar localmente (Acode/Computador), ele usa a própria origem automaticamente.
        const urlServidor = window.location.hostname.includes("github.io") 
            ? "https://sala-project.onrender.com" // O Render lê o nome do repositório do seu package.json e gera esse link padrão
            : window.location.origin;

        const socket = io(urlServidor);
        
        let meuApelido = "";
        let salaAtual = "";
        let meuStream = null;
        let peer = null;
        const conexoesAtivas = {};

        socket.on('erro', (msg) => alert("⚠️ Servidor diz: " + msg));

        /* ================= LOGICA DAS SALAS ================= */
        function alternarCampoSenha() {
            const tipo = document.getElementById('room-type').value;
            document.getElementById('room-password').style.display = tipo === 'privada' ? 'block' : 'none';
        }

        function criarNovaSala() {
            const apelido = document.getElementById('username').value.trim();
            const nomeSala = document.getElementById('new-room-name').value.trim().toLowerCase();
            const tipo = document.getElementById('room-type').value;
            const senha = document.getElementById('room-password').value;

            if (!apelido || !nomeSala) return alert("Apelido e nome da sala são obrigatórios.");
            if (tipo === 'privada' && !senha) return alert("Defina a senha da sala privada.");

            meuApelido = apelido;
            socket.emit('criar-sala', { nomeSala, tipo, senha });
        }

        socket.on('sala-criada-sucesso', (nomeSala) => {
            const senha = document.getElementById('room-password').value;
            socket.emit('tentar-entrar', { nomeSala, senha });
        });

        socket.on('atualizar-salas', (documentSalas) => {
            const container = document.getElementById('lista-de-salas');
            if (!container) return;

            if (documentSalas.length === 0) {
                container.innerHTML = `<p class="txt-vazio">Nenhum canal ativo. Seja o primeiro a criar!</p>`;
                return;
            }

            container.innerHTML = "";
            documentSalas.forEach(sala => {
                const item = document.createElement('div');
                item.className = "sala-item";
                const icone = sala.tipo === 'privada' ? '🔒' : '🌐';
                
                item.innerHTML = `
                    <span><strong>${icone} ${sala.id}</strong> (${sala.participantes} online)</span>
                    <button class="btn-entrar-sala" onclick="clicarParaEntrar('${sala.id}', '${sala.tipo}')">Entrar</button>
                `;
                container.appendChild(item);
            });
        });

        function clicarParaEntrar(nomeSala, tipo) {
            const apelido = document.getElementById('username').value.trim();
            if (!apelido) return alert("Insira seu apelido primeiro.");
            
            meuApelido = apelido;
            let senha = (tipo === 'privada') ? prompt("Digite a senha do canal privado:") : null;
            if (tipo === 'privada' && senha === null) return;

            socket.emit('tentar-entrar', { nomeSala, senha });
        }

        socket.on('entrada-autorizada', (nomeSala) => {
            salaAtual = nomeSala;
            inicializarPainelChatCall();
        });

        /* ================= LOGICA DO CHAT E CALL (WEBRTC) ================= */
        async function inicializarPainelChatCall() {
            document.getElementById('tela-salas').style.display = 'none';
            document.getElementById('tela-chat').style.display = 'flex';
            document.getElementById('nome-sala-titulo').innerText = `💬 #${salaAtual}`;

            // Configurar Input de Texto de forma limpa
            const input = document.getElementById('txt-mensagem');
            const novoInput = input.cloneNode(true);
            input.parentNode.replaceChild(novoInput, input);
            novoInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && e.target.value.trim() !== "") {
                    socket.emit('send-message', e.target.value, meuApelido);
                    e.target.value = "";
                }
            });

            // Capturar Câmera e Microfone do Dispositivo (Funciona minimizado)
            try {
                meuStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                renderizarVideoDoUsuario(document.createElement('video'), meuStream, true);
            } catch (e) {
                try {
                    meuStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                    adicionarLogSistema("Câmera indisponível. Conectado apenas com Áudio.");
                } catch (err) {
                    adicionarLogSistema("Conectado em modo de observação (Sem áudio/vídeo).");
                }
            }

            // Criar conexão PeerJS baseada no host descoberto dinamicamente
            const extrairHost = urlServidor.replace("https://", "").replace("http://", "").split(":")[0];
            
            peer = new Peer(undefined, {
                host: window.location.hostname.includes("github.io") ? extrairHost : '/',
                port: window.location.hostname.includes("github.io") ? '443' : window.location.port || '3000',
                secure: window.location.protocol === 'https:' || window.location.hostname.includes("github.io")
            });

            peer.on('open', (idP2P) => {
                socket.emit('join-room', salaAtual, idP2P);
            });

            peer.on('call', call => {
                call.answer(meuStream);
                const videoElement = document.createElement('video');
                call.on('stream', streamRemoto => renderizarVideoDoUsuario(videoElement, streamRemoto));
            });

            socket.on('user-connected', userId => {
                adicionarLogSistema("Alguém entrou no canal de voz.");
                if (meuStream) {
                    const call = peer.call(userId, meuStream);
                    const videoElement = document.createElement('video');
                    call.on('stream', streamRemoto => renderizarVideoDoUsuario(videoElement, streamRemoto));
                    call.on('close', () => videoElement.remove());
                    conexoesAtivas[userId] = call;
                }
            });

            socket.on('user-disconnected', userId => {
                adicionarLogSistema("Alguém saiu do canal de voz.");
                if (conexoesAtivas[userId]) {
                    conexoesAtivas[userId].close();
                    delete conexoesAtivas[userId];
                }
            });
        }

        socket.on('create-message', (msg, username) => {
            const area = document.getElementById('chat-mensagens');
            const bloco = document.createElement('div');
            bloco.className = "mensagem-bloco";
            bloco.innerHTML = `<span class="autor">${username}:</span><span class="texto">${msg}</span>`;
            area.appendChild(bloco);
            area.scrollTop = area.scrollHeight;
        });

        function renderizarVideoDoUsuario(el, stream, mutado = false) {
            if (!stream) return;
            el.srcObject = stream;
            el.addEventListener('loadedmetadata', () => el.play().catch(() => {}));
            if (mutado) el.muted = true;
            document.getElementById('video-grid').append(el);
        }

        function adicionarLogSistema(texto) {
            const area = document.getElementById('chat-mensagens');
            const log = document.createElement('div');
            log.style.color = "#949ba4";
            log.style.fontSize = "13px";
            log.style.fontStyle = "italic";
            log.style.margin = "5px 0";
            log.innerText = `⚙️ ${texto}`;
            area.appendChild(log);
            area.scrollTop = area.scrollHeight;
        }

        function sairDaSala() {
            if (meuStream) meuStream.getTracks().forEach(t => t.stop());
            window.location.reload();
        }
    </script>
</body>
</html>
