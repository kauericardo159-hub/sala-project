<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Hub | Meu Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-viewport" style="display: none;">
        <div id="layout-barra-lateral"></div>
        <div id="layout-user-explorer"></div>
    </main>

    <div id="z-core-loader" class="loader-wrapper">
        <div class="spinner"></div>
        <p>Carregando suas configurações...</p>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <script>
        const urlServidor = "https://sala-project.onrender.com";
        // Configuração de transporte otimizada para evitar timeouts no Render
        const socket = io(urlServidor, { 
            transports: ['websocket', 'polling'],
            upgrade: true,
            rememberUpgrade: true
        });

        // Expondo o socket globalmente para ser lido pelos scripts modulares
        window.socket = socket;

        // Trava de Segurança: Se não existir sessão ativa, chuta o usuário direto pro login.html
        const sessaoAtiva = localStorage.getItem('zhub_session_data');
        if (!sessaoAtiva) {
            window.location.href = "login.html";
        }

        socket.on('connect', () => {
            try {
                const dados = JSON.parse(sessaoAtiva);
                // Autentica silenciosamente para liberar o carregamento seguro da página
                socket.emit('login-usuario', { username: dados.username, senha: dados.senha });
            } catch(e) {
                localStorage.removeItem('zhub_session_data');
                window.location.href = "login.html";
            }
        });

        socket.on('login-sucesso', (dados) => {
            console.log(`🟢 Sessão validada para @${dados.username}. Renderizando Perfil.`);
            
            // Remove o loader e exibe o Viewport em modo flex para o barra.js se alinhar
            document.getElementById('z-core-loader').style.display = 'none';
            document.getElementById('app-viewport').style.display = 'flex';
        });

        socket.on('erro', (msg) => {
            console.warn("⚠️ Falha na validação automática de sessão:", msg);
            // Se as credenciais salvas expirarem ou derem erro, limpa o lixo e manda pro login
            localStorage.removeItem('zhub_session_data');
            window.location.href = "login.html";
        });
    </script>

    <script src="barra.js"></script>
    <script src="save-conta.js"></script> <script src="perfil.js"></script>
</body>
</html>
